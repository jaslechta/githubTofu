application:
  name: myapp

openshift_auth:
  enabled: true
  path: openshift
  kubernetes_host: "https://api.cluster.pro.example.com:6443"
  kubernetes_ca_cert: ""
  token_reviewer_jwt: ""
  disable_local_ca_jwt: false
  issuer: ""
  role_name: "myapp"
  bound_service_account_names:
    - "myapp"
  bound_service_account_namespaces:
    - "myapp-acc"
  audience: "vault"
  token_policies:
    - "s2"
  token_ttl: 3600

pki:
  enabled: true
  path: pki
  role_name: myapp-role
  allowed_domains:
    - myapp.apps.pro.example.com
  allow_subdomains: true
  allowed_cn:
    - myapp.apps.pro.example.com
  dn: "OU=Apps,O=MyCompany,C=CZ"
  serverdn: "OU=Servers,O=MyCompany,C=CZ"
  app_support_group: "MS_CZ_PRO_MYAPP_S2"
  app_support_email: "app-support@example.com"
  service_account_prefix: "sa-myapp"

environments:
  acc:
    enabled: true
    policies:
      s2: |
        path "kv/data/*" {
          capabilities = ["create", "read", "update", "delete", "list"]
        }
        path "kv/metadata/*" {
          capabilities = ["read", "list", "delete"]
        }
      tech: |
        path "kv/data/*" {
          capabilities = ["read"]
        }
        path "kv/metadata/*" {
          capabilities = ["read", "list"]
        }
