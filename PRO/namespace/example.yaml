name: myapp
create: true

kv:
  path: kv
  version: 2

ldap:
  enabled: true
  path: ldap
  description: LDAP auth for myapp

policies:
  s2: |
    path "kv/data/*" {
      capabilities = ["create", "read", "update", "delete", "list"]
    }
    path "kv/metadata/*" {
      capabilities = ["read", "list", "delete"]
    }

  tech: |
    path "sys/internal/ui/resultant-acl" {
      capabilities = ["read", "list"]
    }

token_roles:
  s2:
    allowed_policies: ["s2"]
    token_ttl: 3600

  tech:
    allowed_policies: ["tech"]
    token_ttl: 3600
