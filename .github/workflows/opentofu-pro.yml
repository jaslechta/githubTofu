name: OpenTofu PRO

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'PRO/**'
      - 'modules/**'
      - '.github/workflows/opentofu-pro.yml'

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PRO
    env:
      TF_VAR_vault_token: ${{ secrets.PRO_VAULT_TOKEN }}
      TF_VAR_ldap_bindpass: ${{ secrets.PRO_LDAP_BINDPASS }}
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.8

      - name: Tofu init
        run: tofu init

      - name: Tofu fmt check
        run: tofu fmt -check -recursive

      - name: Tofu validate
        run: tofu validate

      - name: Tofu plan
        run: tofu plan -input=false -out=tfplan

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-pro
          path: PRO/tfplan
          retention-days: 1

  detect_features:
    needs: plan
    runs-on: ubuntu-latest
    outputs:
      needs_pki: ${{ steps.check.outputs.needs_pki }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect PKI in changed namespace files
        id: check
        run: |
          if [ "${{ github.event_name }}" = "push" ] && \
             git rev-parse "${{ github.event.before }}" > /dev/null 2>&1; then
            files=$(git diff --name-only "${{ github.event.before }}" HEAD \
                    | grep '^PRO/namespace/.*\.yaml$' || true)
          else
            files=$(find PRO/namespace -name '*.yaml' | sort || true)
          fi

          needs_pki=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ ! -f "$f" ] && continue
            if [ "$(yq '.pki.enabled' "$f")" = "true" ]; then
              needs_pki=true
              break
            fi
          done <<< "$files"

          echo "needs_pki=${needs_pki}" >> "$GITHUB_OUTPUT"

  apply_standard:
    needs: detect_features
    if: needs.detect_features.outputs.needs_pki == 'false' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PRO
    env:
      TF_VAR_vault_token: ${{ secrets.PRO_VAULT_TOKEN }}
      TF_VAR_ldap_bindpass: ${{ secrets.PRO_LDAP_BINDPASS }}
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.8

      - uses: actions/download-artifact@v4
        with:
          name: tfplan-pro
          path: PRO

      - name: Tofu init
        run: tofu init

      - name: Tofu apply
        run: tofu apply -auto-approve -input=false tfplan

  apply_pki:
    needs: detect_features
    if: needs.detect_features.outputs.needs_pki == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: vault-pro-pki
    defaults:
      run:
        working-directory: PRO
    env:
      TF_VAR_vault_token: ${{ secrets.PRO_VAULT_TOKEN }}
      TF_VAR_ldap_bindpass: ${{ secrets.PRO_LDAP_BINDPASS }}
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.8

      - uses: actions/download-artifact@v4
        with:
          name: tfplan-pro
          path: PRO

      - name: Tofu init
        run: tofu init

      - name: Tofu apply
        run: tofu apply -auto-approve -input=false tfplan
